name: Setup Environment

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  setup-env:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.15.0'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Create .env.local from GitHub Secrets
        run: |
          cat > .env.local << EOF
          NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }}
          YAHOO_CALLBACK_URL=${{ secrets.NEXTAUTH_URL }}/api/auth/callback/yahoo
          YAHOO_AUTH_URL=${{ secrets.YAHOO_AUTH_URL }}
          YAHOO_TOKEN_URL=${{ secrets.YAHOO_TOKEN_URL }}
          YAHOO_CLIENT_ID=${{ secrets.YAHOO_CLIENT_ID }}
          YAHOO_CLIENT_SECRET=${{ secrets.YAHOO_CLIENT_SECRET }}
          EOF

      - name: Set NEXTAUTH_URL for preview deployments
        if: github.event_name == 'pull_request' && env.VERCEL_URL != ''
        run: |
          # For preview deployments, if NEXTAUTH_URL is not explicitly set in secrets,
          # we can rely on the dynamic NEXTAUTH_URL resolution in the NextAuth config
          # which will use VERCEL_URL when available
          echo "Preview deployment detected. NEXTAUTH_URL will be dynamically set using VERCEL_URL"

      - name: Verify .env.local was created
        run: |
          if [ -f .env.local ]; then
            echo ".env.local created successfully"
            echo "Environment variables set:"
            grep -v "^$" .env.local | cut -d= -f1
          else
            echo "ERROR: .env.local was not created"
            exit 1
          fi

      - name: Validate environment variables at build time
        run: |
          echo "🔍 Validating required environment variables..."
          
          # Check for NEXTAUTH_SECRET (required for build-time validation)
          if [ -z "${{ secrets.NEXTAUTH_SECRET }}" ]; then
            echo "❌ ERROR: NEXTAUTH_SECRET is not set in GitHub Secrets"
            echo "This variable is REQUIRED for the build to succeed."
            echo "Please add NEXTAUTH_SECRET to your GitHub Secrets:"
            echo "  1. Go to Settings > Secrets and variables > Actions"
            echo "  2. Click 'New repository secret'"
            echo "  3. Name: NEXTAUTH_SECRET"
            echo "  4. Value: Generate with 'openssl rand -base64 32'"
            exit 1
          fi
          
          echo "✅ NEXTAUTH_SECRET is set"
          
          # Check for recommended variables
          if [ -z "${{ secrets.NEXTAUTH_URL }}" ]; then
            echo "⚠️  WARNING: NEXTAUTH_URL is not set in GitHub Secrets"
            echo "This is recommended for production deployments."
          else
            echo "✅ NEXTAUTH_URL is set"
          fi
          
          if [ -z "${{ secrets.YAHOO_CLIENT_ID }}" ]; then
            echo "⚠️  WARNING: YAHOO_CLIENT_ID is not set in GitHub Secrets"
          else
            echo "✅ YAHOO_CLIENT_ID is set"
          fi
          
          if [ -z "${{ secrets.YAHOO_CLIENT_SECRET }}" ]; then
            echo "⚠️  WARNING: YAHOO_CLIENT_SECRET is not set in GitHub Secrets"
          else
            echo "✅ YAHOO_CLIENT_SECRET is set"
          fi
          
          echo ""
          echo "✅ Build-time environment validation passed!"

      - name: Lint
        run: yarn lint

      - name: Type check
        run: yarn typecheck

      - name: Build
        run: yarn build
