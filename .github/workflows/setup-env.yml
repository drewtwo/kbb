name: Setup Environment

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  setup-env:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Create .env.local from GitHub Secrets
        run: |
          cat > .env.local << EOF
          NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }}
          YAHOO_AUTH_URL=${{ secrets.YAHOO_AUTH_URL }}
          YAHOO_TOKEN_URL=${{ secrets.YAHOO_TOKEN_URL }}
          YAHOO_CLIENT_ID=${{ secrets.YAHOO_CLIENT_ID }}
          YAHOO_CLIENT_SECRET=${{ secrets.YAHOO_CLIENT_SECRET }}
          EOF

      - name: Set NEXTAUTH_URL for preview deployments
        if: github.event_name == 'pull_request' && env.VERCEL_URL != ''
        run: |
          # For preview deployments, if NEXTAUTH_URL is not explicitly set in secrets,
          # we can rely on the dynamic NEXTAUTH_URL resolution in the NextAuth config
          # which will use VERCEL_URL when available
          echo "Preview deployment detected. NEXTAUTH_URL will be dynamically set using VERCEL_URL"

      - name: Verify .env.local was created
        run: |
          if [ -f .env.local ]; then
            echo ".env.local created successfully"
            echo "Environment variables set:"
            grep -v "^$" .env.local | cut -d= -f1
          else
            echo "ERROR: .env.local was not created"
            exit 1
          fi

      - name: Lint
        run: yarn lint

      - name: Type check
        run: yarn typecheck

      - name: Build
        run: yarn build
